naftiko: 1.0.0-alpha2
info:
  label: Maps — WMS / WMTS
  description: 'Maps — WMS / WMTS. 3 operations. Lead operation: GetMap. Self-contained Naftiko capability covering one Tomtom
    business surface.'
  tags:
  - Tomtom
  - WMS / WMTS
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    TOMTOM_API_KEY: TOMTOM_API_KEY
capability:
  consumes:
  - type: http
    namespace: maps-wms-wmts
    baseUri: https://api.tomtom.com
    description: Maps — WMS / WMTS business capability. Self-contained, no shared references.
    resources:
    - name: map-versionNumber-wms
      path: /map/{versionNumber}/wms/
      operations:
      - name: getmap
        method: GET
        description: GetMap
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: versionNumber
          in: path
          type: integer
          description: Version of the service to call. The current version is 1
          required: true
        - name: request
          in: query
          type: string
          description: Request type
          required: true
        - name: srs
          in: query
          type: string
          description: Projection used in describing the <b>bbox</b> EPSG:3857 is
          required: true
        - name: bbox
          in: query
          type: string
          description: Bounding box in the projection stated in <b>srs</b>
          required: true
        - name: width
          in: query
          type: integer
          description: Width of the resulting image, in pixels Maximum value is 2048
          required: true
        - name: height
          in: query
          type: integer
          description: Height of the resulting image, in pixels Maximum value is 2048
          required: true
        - name: format
          in: query
          type: string
          description: Image format to be returned
          required: true
        - name: layers
          in: query
          type: string
          description: Map layers requested Currently only the basic layer is available
          required: true
        - name: styles
          in: query
          type: string
          description: Map styles to be returned. Currently, no styles are available. This
        - name: service
          in: query
          type: string
          description: Service type
        - name: version
          in: query
          type: string
          description: WMS service version
          required: true
    - name: map-versionNumber-wms
      path: /map/{versionNumber}/wms//
      operations:
      - name: getcapabilities
        method: GET
        description: GetCapabilities
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: versionNumber
          in: path
          type: integer
          required: true
        - name: service
          in: query
          type: string
          required: true
        - name: request
          in: query
          type: string
          required: true
        - name: version
          in: query
          type: string
          description: WMS service version
    - name: map-versionNumber-wmts-key-wmtsVersion-WMTSCapabilities.xml
      path: /map/{versionNumber}/wmts/{key}/{wmtsVersion}/WMTSCapabilities.xml
      operations:
      - name: get
        method: GET
        description: WMTS
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: versionNumber
          in: path
          type: integer
          description: Version of the service to call. The current version is 1
          required: true
        - name: key
          in: path
          type: string
          description: Your API key for calling this service.
          required: true
        - name: wmtsVersion
          in: path
          type: string
          required: true
    authentication:
      type: apikey
      key: key
      value: '{{env.TOMTOM_API_KEY}}'
      placement: query
  exposes:
  - type: rest
    namespace: maps-wms-wmts-rest
    port: 8080
    description: REST adapter for Maps — WMS / WMTS. One Spectral-compliant resource per consumed operation, prefixed with
      /v1.
    resources:
    - path: /v1/map/{versionnumber}/wms
      name: map-versionnumber-wms
      description: REST surface for map-versionNumber-wms.
      operations:
      - method: GET
        name: getmap
        description: GetMap
        call: maps-wms-wmts.getmap
        with:
          versionNumber: rest.versionNumber
          request: rest.request
          srs: rest.srs
          bbox: rest.bbox
          width: rest.width
          height: rest.height
          format: rest.format
          layers: rest.layers
          styles: rest.styles
          service: rest.service
          version: rest.version
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/map/{versionnumber}/wms
      name: map-versionnumber-wms
      description: REST surface for map-versionNumber-wms.
      operations:
      - method: GET
        name: getcapabilities
        description: GetCapabilities
        call: maps-wms-wmts.getcapabilities
        with:
          versionNumber: rest.versionNumber
          service: rest.service
          request: rest.request
          version: rest.version
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/map/{versionnumber}/wmts/{key}/{wmtsversion}/wmtscapabilities-xml
      name: map-versionnumber-wmts-key-wmtsversion-wmtscapabilities-xml
      description: REST surface for map-versionNumber-wmts-key-wmtsVersion-WMTSCapabilities.xml.
      operations:
      - method: GET
        name: get
        description: WMTS
        call: maps-wms-wmts.get
        with:
          versionNumber: rest.versionNumber
          key: rest.key
          wmtsVersion: rest.wmtsVersion
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: maps-wms-wmts-mcp
    port: 9090
    transport: http
    description: MCP adapter for Maps — WMS / WMTS. One tool per consumed operation, routed inline through this capability's
      consumes block.
    tools:
    - name: getmap
      description: GetMap
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: maps-wms-wmts.getmap
      with:
        versionNumber: tools.versionNumber
        request: tools.request
        srs: tools.srs
        bbox: tools.bbox
        width: tools.width
        height: tools.height
        format: tools.format
        layers: tools.layers
        styles: tools.styles
        service: tools.service
        version: tools.version
      outputParameters:
      - type: object
        mapping: $.
    - name: getcapabilities
      description: GetCapabilities
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: maps-wms-wmts.getcapabilities
      with:
        versionNumber: tools.versionNumber
        service: tools.service
        request: tools.request
        version: tools.version
      outputParameters:
      - type: object
        mapping: $.
    - name: wmts
      description: WMTS
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: maps-wms-wmts.get
      with:
        versionNumber: tools.versionNumber
        key: tools.key
        wmtsVersion: tools.wmtsVersion
      outputParameters:
      - type: object
        mapping: $.
