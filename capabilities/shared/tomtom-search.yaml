naftiko: "1.0.0-alpha1"

info:
  label: "TomTom Search API"
  description: "TomTom Search API for fuzzy search, geocoding, reverse geocoding, and points of interest discovery."
  tags:
    - TomTom
    - Search
    - Geocoding
    - Location
  created: "2026-05-03"
  modified: "2026-05-03"

binds:
  - namespace: env
    keys:
      TOMTOM_API_KEY: TOMTOM_API_KEY

capability:
  consumes:
    - type: http
      namespace: tomtom-search
      baseUri: https://api.tomtom.com
      description: "TomTom Search API"
      authentication:
        type: apikey
        key: key
        value: "{{TOMTOM_API_KEY}}"
        placement: query
      resources:
        - name: search
          path: /search/2
          description: "Location search operations"
          operations:
            - name: fuzzy-search
              method: GET
              description: "Fuzzy search for addresses and points of interest"
              inputParameters:
                - name: query
                  in: path
                  type: string
                  required: true
                  description: "Search query string"
                - name: lat
                  in: query
                  type: number
                  required: false
                  description: "Latitude for proximity bias"
                - name: lon
                  in: query
                  type: number
                  required: false
                  description: "Longitude for proximity bias"
                - name: limit
                  in: query
                  type: integer
                  required: false
                  description: "Maximum number of results"
                - name: countrySet
                  in: query
                  type: string
                  required: false
                  description: "Comma-separated ISO country codes"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
            - name: geocode
              method: GET
              description: "Convert address to geographic coordinates"
              inputParameters:
                - name: query
                  in: path
                  type: string
                  required: true
                  description: "Address to geocode"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
            - name: reverse-geocode
              method: GET
              description: "Convert coordinates to address"
              inputParameters:
                - name: position
                  in: path
                  type: string
                  required: true
                  description: "Coordinates to reverse geocode (lat,lon)"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
            - name: poi-search
              method: GET
              description: "Search for points of interest by name or category"
              inputParameters:
                - name: query
                  in: path
                  type: string
                  required: true
                  description: "POI name or category"
                - name: lat
                  in: query
                  type: number
                  required: false
                - name: lon
                  in: query
                  type: number
                  required: false
                - name: radius
                  in: query
                  type: integer
                  required: false
                  description: "Search radius in meters"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."

  exposes:
    - type: rest
      port: 8102
      namespace: tomtom-search-rest
      resources:
        - path: /v1/search
          name: search
          description: "Fuzzy search"
          operations:
            - method: GET
              name: fuzzy-search
              description: "Fuzzy search"
              call: "tomtom-search.fuzzy-search"
              outputParameters:
                - type: object
                  mapping: "$."

    - type: mcp
      port: 9102
      namespace: tomtom-search-mcp
      transport: http
      tools:
        - name: fuzzy-search
          description: "Search for addresses and points of interest using TomTom"
          hints:
            readOnly: true
            openWorld: true
          call: "tomtom-search.fuzzy-search"
          outputParameters:
            - type: object
              mapping: "$."
        - name: geocode
          description: "Convert a street address to geographic coordinates"
          hints:
            readOnly: true
            openWorld: true
          call: "tomtom-search.geocode"
          outputParameters:
            - type: object
              mapping: "$."
        - name: reverse-geocode
          description: "Convert geographic coordinates to a street address"
          hints:
            readOnly: true
            openWorld: true
          call: "tomtom-search.reverse-geocode"
          outputParameters:
            - type: object
              mapping: "$."
        - name: poi-search
          description: "Search for nearby points of interest by name or category"
          hints:
            readOnly: true
            openWorld: true
          call: "tomtom-search.poi-search"
          outputParameters:
            - type: object
              mapping: "$."
