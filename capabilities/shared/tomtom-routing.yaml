naftiko: "1.0.0-alpha1"

info:
  label: "TomTom Routing API"
  description: "TomTom Routing API for calculating routes between locations with traffic optimization, EV support, and batch routing."
  tags:
    - TomTom
    - Routing
    - Navigation
    - Transportation
  created: "2026-05-03"
  modified: "2026-05-03"

binds:
  - namespace: env
    keys:
      TOMTOM_API_KEY: TOMTOM_API_KEY

capability:
  consumes:
    - type: http
      namespace: tomtom-routing
      baseUri: https://api.tomtom.com
      description: "TomTom Routing API"
      authentication:
        type: apikey
        key: key
        value: "{{TOMTOM_API_KEY}}"
        placement: query
      resources:
        - name: routes
          path: /routing/1
          description: "Route calculation"
          operations:
            - name: calculate-route
              method: GET
              description: "Calculate route between locations"
              inputParameters:
                - name: locations
                  in: path
                  type: string
                  required: true
                  description: "Colon-separated coordinates (lat,lon:lat,lon)"
                - name: routeType
                  in: query
                  type: string
                  required: false
                  description: "Route optimization type"
                - name: traffic
                  in: query
                  type: boolean
                  required: false
                  description: "Use real-time traffic"
                - name: travelMode
                  in: query
                  type: string
                  required: false
                  description: "Mode of travel (car, truck, bicycle, etc.)"
                - name: maxAlternatives
                  in: query
                  type: integer
                  required: false
                  description: "Number of alternative routes"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
            - name: calculate-reachable-range
              method: GET
              description: "Calculate area reachable within time or distance constraints"
              inputParameters:
                - name: origin
                  in: path
                  type: string
                  required: true
                  description: "Origin coordinates (lat,lon)"
                - name: timeBudgetInSec
                  in: query
                  type: number
                  required: false
                  description: "Maximum travel time in seconds"
                - name: distanceBudgetInMeters
                  in: query
                  type: number
                  required: false
                  description: "Maximum distance in meters"
                - name: energyBudgetInkWh
                  in: query
                  type: number
                  required: false
                  description: "Energy budget for EV routing"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."

  exposes:
    - type: rest
      port: 8101
      namespace: tomtom-routing-rest
      resources:
        - path: /v1/routes
          name: routes
          description: "Route calculation"
          operations:
            - method: GET
              name: calculate-route
              description: "Calculate route"
              call: "tomtom-routing.calculate-route"
              outputParameters:
                - type: object
                  mapping: "$."

    - type: mcp
      port: 9101
      namespace: tomtom-routing-mcp
      transport: http
      tools:
        - name: calculate-route
          description: "Calculate a route between two or more locations using TomTom"
          hints:
            readOnly: true
            openWorld: true
          call: "tomtom-routing.calculate-route"
          outputParameters:
            - type: object
              mapping: "$."
        - name: calculate-reachable-range
          description: "Calculate the area reachable from a point within time or distance limits"
          hints:
            readOnly: true
            openWorld: true
          call: "tomtom-routing.calculate-reachable-range"
          outputParameters:
            - type: object
              mapping: "$."
