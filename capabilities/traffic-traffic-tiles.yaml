naftiko: 1.0.0-alpha2
info:
  label: TomTom Traffic API — Traffic Tiles
  description: 'TomTom Traffic API — Traffic Tiles. 3 operations. Lead operation: Get Raster Flow Tile. Self-contained Naftiko
    capability covering one Tomtom business surface.'
  tags:
  - Tomtom
  - Traffic Tiles
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    TOMTOM_API_KEY: TOMTOM_API_KEY
capability:
  consumes:
  - type: http
    namespace: traffic-traffic-tiles
    baseUri: https://api.tomtom.com
    description: TomTom Traffic API — Traffic Tiles business capability. Self-contained, no shared references.
    resources:
    - name: traffic-map-versionNumber-tile-flow-style-zoom-x-y}.{format
      path: /traffic/map/{versionNumber}/tile/flow/{style}/{zoom}/{x}/{y}.{format}
      operations:
      - name: getrasterflowtile
        method: GET
        description: Get Raster Flow Tile
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: versionNumber
          in: path
          type: integer
          required: true
        - name: style
          in: path
          type: string
          required: true
        - name: zoom
          in: path
          type: integer
          required: true
        - name: x
          in: path
          type: integer
          required: true
        - name: y
          in: path
          type: integer
          required: true
        - name: format
          in: path
          type: string
          required: true
        - name: key
          in: query
          type: string
          required: true
        - name: t
          in: query
          type: string
          description: Traffic model ID
    - name: traffic-map-versionNumber-tile-flow-zoom-x-y}.pbf
      path: /traffic/map/{versionNumber}/tile/flow/{zoom}/{x}/{y}.pbf
      operations:
      - name: getvectorflowtile
        method: GET
        description: Get Vector Flow Tile
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: versionNumber
          in: path
          type: integer
          required: true
        - name: zoom
          in: path
          type: integer
          required: true
        - name: x
          in: path
          type: integer
          required: true
        - name: y
          in: path
          type: integer
          required: true
        - name: key
          in: query
          type: string
          required: true
    - name: traffic-services-versionNumber-incidentTile-style-zoom-x-y}.{format
      path: /traffic/services/{versionNumber}/incidentTile/{style}/{zoom}/{x}/{y}.{format}
      operations:
      - name: getrasterincidenttile
        method: GET
        description: Get Raster Incident Tile
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: versionNumber
          in: path
          type: integer
          required: true
        - name: style
          in: path
          type: string
          required: true
        - name: zoom
          in: path
          type: integer
          required: true
        - name: x
          in: path
          type: integer
          required: true
        - name: y
          in: path
          type: integer
          required: true
        - name: format
          in: path
          type: string
          required: true
        - name: key
          in: query
          type: string
          required: true
        - name: t
          in: query
          type: string
          description: Traffic model ID
    authentication:
      type: apikey
      key: key
      value: '{{env.TOMTOM_API_KEY}}'
      placement: query
  exposes:
  - type: rest
    namespace: traffic-traffic-tiles-rest
    port: 8080
    description: REST adapter for TomTom Traffic API — Traffic Tiles. One Spectral-compliant resource per consumed operation,
      prefixed with /v1.
    resources:
    - path: /v1/traffic/map/{versionnumber}/tile/flow/{style}/{zoom}/{x}/{y-format}
      name: traffic-map-versionnumber-tile-flow-style-zoom-x-y-format
      description: REST surface for traffic-map-versionNumber-tile-flow-style-zoom-x-y}.{format.
      operations:
      - method: GET
        name: getrasterflowtile
        description: Get Raster Flow Tile
        call: traffic-traffic-tiles.getrasterflowtile
        with:
          versionNumber: rest.versionNumber
          style: rest.style
          zoom: rest.zoom
          x: rest.x
          y: rest.y
          format: rest.format
          key: rest.key
          t: rest.t
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/traffic/map/{versionnumber}/tile/flow/{zoom}/{x}/y-pbf
      name: traffic-map-versionnumber-tile-flow-zoom-x-y-pbf
      description: REST surface for traffic-map-versionNumber-tile-flow-zoom-x-y}.pbf.
      operations:
      - method: GET
        name: getvectorflowtile
        description: Get Vector Flow Tile
        call: traffic-traffic-tiles.getvectorflowtile
        with:
          versionNumber: rest.versionNumber
          zoom: rest.zoom
          x: rest.x
          y: rest.y
          key: rest.key
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/traffic/services/{versionnumber}/incidenttile/{style}/{zoom}/{x}/{y-format}
      name: traffic-services-versionnumber-incidenttile-style-zoom-x-y-format
      description: REST surface for traffic-services-versionNumber-incidentTile-style-zoom-x-y}.{format.
      operations:
      - method: GET
        name: getrasterincidenttile
        description: Get Raster Incident Tile
        call: traffic-traffic-tiles.getrasterincidenttile
        with:
          versionNumber: rest.versionNumber
          style: rest.style
          zoom: rest.zoom
          x: rest.x
          y: rest.y
          format: rest.format
          key: rest.key
          t: rest.t
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: traffic-traffic-tiles-mcp
    port: 9090
    transport: http
    description: MCP adapter for TomTom Traffic API — Traffic Tiles. One tool per consumed operation, routed inline through
      this capability's consumes block.
    tools:
    - name: get-raster-flow-tile
      description: Get Raster Flow Tile
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: traffic-traffic-tiles.getrasterflowtile
      with:
        versionNumber: tools.versionNumber
        style: tools.style
        zoom: tools.zoom
        x: tools.x
        y: tools.y
        format: tools.format
        key: tools.key
        t: tools.t
      outputParameters:
      - type: object
        mapping: $.
    - name: get-vector-flow-tile
      description: Get Vector Flow Tile
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: traffic-traffic-tiles.getvectorflowtile
      with:
        versionNumber: tools.versionNumber
        zoom: tools.zoom
        x: tools.x
        y: tools.y
        key: tools.key
      outputParameters:
      - type: object
        mapping: $.
    - name: get-raster-incident-tile
      description: Get Raster Incident Tile
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: traffic-traffic-tiles.getrasterincidenttile
      with:
        versionNumber: tools.versionNumber
        style: tools.style
        zoom: tools.zoom
        x: tools.x
        y: tools.y
        format: tools.format
        key: tools.key
        t: tools.t
      outputParameters:
      - type: object
        mapping: $.
