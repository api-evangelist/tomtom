specification: API Commons Rate Limits
specificationVersion: '0.1'
schema: https://raw.githubusercontent.com/api-evangelist/interface-research/main/schema/api-commons.yml#/$defs/RateLimits
provider: TomTom
providerId: tomtom
created: '2026-05-04'
modified: '2026-05-04'
reconciled: true
tags:
  - Rate Limiting
  - Maps
description: TomTom Maps API rate limits per API key.
sources:
  - https://developer.tomtom.com/pricing
  - https://developer.tomtom.com/maps-api/documentation/product-information/quick-start
headers: {}
responseCodes:
  throttled: 429
limits:
  - name: Default per-key
    scope: key
    metric: requests_per_second
    limit: 5
    timeFrame: second
    notes: Soft default; can be raised.
  - name: Daily allowance (Freemium/PAYG)
    scope: key
    metric: requests_per_day
    limit: 52500
    timeFrame: day
    notes: 50K tile + 2.5K non-tile shared
  - name: Map Display API
    scope: key
    metric: tile_requests_per_day
    limit: 50000
    timeFrame: day
