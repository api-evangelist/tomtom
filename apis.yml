aid: tomtom
name: TomTom
description: >-
  TomTom provides a comprehensive suite of location technology APIs and SDKs including
  maps, search, routing, traffic, navigation, and automotive data services. The TomTom
  developer platform is trusted by major automotive manufacturers, logistics companies,
  and application developers. APIs cover real-time traffic incidents and flow, route
  calculation, geocoding, points of interest search, geofencing, parking availability,
  fuel prices, and electric vehicle routing. TomTom also provides an MCP Server for
  AI integration with location intelligence.
type: Index
position: Consumer
access: 3rd-Party
