apis:
  - aid: tomtom:tomtom-maps-api
    name: TomTom Maps API
    description: >-
      The TomTom Maps API provides raster and vector map tiles for display in web
      and mobile applications. Includes copyright information endpoints and supports
      19+ zoom levels. Returns PNG/JPG tiles for raster and Protocol Buffer format
      for vector tiles.
    humanURL: https://developer.tomtom.com/map-display-api/documentation/product-information/introduction
    baseURL: https://api.tomtom.com
    tags:
      - Maps
      - Tiles
      - Raster
      - Vector
    properties:
      - type: Documentation
        url: https://developer.tomtom.com/map-display-api/documentation/product-information/introduction
      - type: OpenAPI
        url: >-
          https://raw.githubusercontent.com/api-evangelist/tomtom/refs/heads/main/openapi/tomtom-maps-openapi.yml
  - aid: tomtom:tomtom-search-api
    name: TomTom Search API
    description: >-
      The TomTom Search API provides fuzzy search for addresses, points of interest,
      and geographic features. Returns latitude/longitude coordinates, place details,
      and geometry data. Includes additional data retrieval, structured geocoding,
      and batch search capabilities.
    humanURL: https://developer.tomtom.com/search-api/documentation/product-information/introduction
    baseURL: https://api.tomtom.com
    tags:
      - Search
      - Geocoding
      - Points of Interest
      - Location
    properties:
      - type: Documentation
        url: https://developer.tomtom.com/search-api/documentation/product-information/introduction
      - type: OpenAPI
        url: >-
          https://raw.githubusercontent.com/api-evangelist/tomtom/refs/heads/main/openapi/tomtom-search-openapi.yml
      - type: API Explorer
        url: https://developer.tomtom.com/search-api/api-explorer
  - aid: tomtom:tomtom-routing-api
    name: TomTom Routing API
    description: >-
      The TomTom Routing API calculates routes between origins and destinations with
      support for up to 150 waypoints, real-time and historical traffic, vehicle type
      optimization, EV consumption models, reachable range calculation, and batch
      routing for multiple route requests.
    humanURL: https://developer.tomtom.com/routing-api/documentation/tomtom-maps/product-information/introduction
    baseURL: https://api.tomtom.com
    tags:
      - Routing
      - Navigation
      - Transportation
      - Electric Vehicle
    properties:
      - type: Documentation
        url: https://developer.tomtom.com/routing-api/documentation/tomtom-maps/product-information/introduction
      - type: OpenAPI
        url: >-
          https://raw.githubusercontent.com/api-evangelist/tomtom/refs/heads/main/openapi/tomtom-routing-openapi.yml
      - type: API Explorer
        url: https://developer.tomtom.com/routing-api/api-explorer
  - aid: tomtom:tomtom-traffic-api
    name: TomTom Traffic API
    description: >-
      The TomTom Traffic API provides real-time traffic incidents and flow data.
      The Traffic Incidents service delivers accurate information about jams, accidents,
      and delays. The Traffic Flow service provides observed speeds and travel times
      updated every minute for key roads. Includes raster and vector tile formats.
    humanURL: https://developer.tomtom.com/traffic-api/documentation/product-information/introduction
    baseURL: https://api.tomtom.com
    tags:
      - Traffic
      - Incidents
      - Real-Time
      - Transportation
    properties:
      - type: Documentation
        url: https://developer.tomtom.com/traffic-api/documentation/product-information/introduction
      - type: API Explorer
        url: https://developer.tomtom.com/traffic-api/api-explorer
      - type: OpenAPI
