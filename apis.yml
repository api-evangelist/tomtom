  - aid: tomtom:tomtom-autostream-api
    name: TomTom AutoStream API
    description: >-
      TomTom AutoStream is a map data delivery platform optimized for on-demand and
      over-the-air cloud-to-device and cloud-to-cloud data streaming for automotive
      applications.
    humanURL: https://developer.tomtom.com/autostream-sdk/documentation/product-information/introduction
