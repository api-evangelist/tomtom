    name: TomTom Geofencing API
    description: >-
      The TomTom Geofencing API enables creation and management of geofence boundaries,
      location history tracking, and notification delivery when assets enter or exit
      defined perimeters.
    humanURL: https://developer.tomtom.com/geofencing-api/documentation/product-information/introduction
    baseURL: https://api.tomtom.com
