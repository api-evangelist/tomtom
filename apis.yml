  - aid: tomtom:tomtom-geocoding-api
    name: TomTom Geocoding API
    description: >-
      The TomTom Geocoding API converts structured addresses into geographic coordinates
      and supports reverse geocoding to translate coordinates into human-readable addresses.
      The Premium Geocoding API adds parking and building entrance location data.
    humanURL: https://developer.tomtom.com/geocoding-api/documentation/product-information/introduction
    baseURL: https://api.tomtom.com
    tags:
      - Geocoding
      - Location
      - Address
    properties:
